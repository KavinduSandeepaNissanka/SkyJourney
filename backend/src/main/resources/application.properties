spring.application.name=skyjourney-backend
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/skyjourney_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# JWT Settings
skyjourney.jwt.secret=9a4f2c8d3b7a1e5f8c3d6b9e2a5f7d3c8b1a4e6f9d2c5b7a1e3f8d6b9c2a5f7d
skyjourney.jwt.expiration-ms=86400000
skyjourney.jwt.cookie-name=skyjourney_jwt
